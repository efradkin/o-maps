    <script>

        let oMaps = [
            ...otherStartsMaps,
            ...twotwoStartsMaps,
            ...orientirStartsMaps,
            ...gsStartsMaps,
            ...volkovStartsMaps,
            ...pskStartsMaps,
            ...ymStartsMaps,
            ...ksStartsMaps,
            ...kkpStartsMaps,
            ...mmsStartsMaps,
            ...wnStartsMaps,
            ...naStartsMaps,
            ...bashMaps,
            ...serbiaMaps,
            ...otherMaps,
            ...samaraMaps,
            ...ryazanMaps,
            ...pskovMaps,
            ...moscowMaps,
            ...rfarStartsMaps,
            ...rogaineRfarMaps,
            ...rogaineBeketovMaps,
            ...rogaineKkmMaps,
            ...rogaineMaps,
            ...funMaps,
            ...specialMaps,
            ...forestMaps,
            ...vsevolozhskMaps,
            ...southMaps,
            ...priozerskMaps,
            ...zelikMaps,
            ...vyborgMaps,
            ...sosnovoMaps,
            ...michuraMaps,
            ...vaskelovoMaps,
            ...toksovoMaps,
            ...parkMaps,
            ...cityMaps,
            ...schoolMaps,
        ];

        populateStartsRanges();

        let oStarts = [];
        for (const so in starts) {
            const s = starts[so];
            s.key = so;
            oStarts.push(s);
        }

        window.onload = function() {

            oStarts = oStarts.filter(s => (s.info || s.rogaine) && s.begin && (s.key !== 'MSK_LIGHT' && s.key !== 'TRI_O_TLON'));
            //oStarts.sort((a, b) => (a.name || '').localeCompare(b.name || ''));

            // Изначальный рендеринг таблицы
            renderStartsTable();
        }

        // Ссылка на тело таблицы
        const tbody = document.querySelector('.o-main-table tbody');

        // строит табличку с инфой об авторах-составителях
        function renderStartsTable() {
            tbody.innerHTML = '';

            let counter = 1;
            for (let i = 0; i < oStarts.length; i++) {
                let s = oStarts[i];

                const row = document.createElement('tr');
                td(row, counter++);
                td(row, buildLogo(s));
                td(row, s.name);
                td(row, buildPeriod(s));
                td(row, buildInfo(s));
                td(row, buildMore(s));
                tbody.appendChild(row);
            }
        }

        function td(row, html) {
            const td = document.createElement('td');
            td.innerHTML = html;
            row.appendChild(td);
        }

        function buildInfo(s) {
            if (s.info) {
                return s.info;
            }
            return '';
        }

        function buildLogo(s) {
            if (s.logo) {
                return `<img src="logo/${s.logo}" class="track-table-pic" />`
            }
            return '';
        }

        function buildMore(s) {
            return `<a href="start.html?start=${s.key}" title="Страничка соревнований"><img src="./images/external-link.png" alt="Страничка соревнований" /></a>`;
        }

        writeWelcomeButton();
    </script>
