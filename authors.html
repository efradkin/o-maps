            </select>

            <select id="region_selector" class="header_selector" onchange="updateUrlParam('region', this.value)">
                <option value="ALL" selected>все регионы</option>
                <option value="SPB">С-Петербург</option>
                <option value="MSK">Москва</option>
                <option value="BASH">Башкортостан</option>

    <script>
        let loadImagesRequired = false;
        let globalTable = true;

        let oMaps = [];
        populateOMaps(funMaps, 'SPB');
        populateOMaps(specialMaps, 'SPB');
        populateOMaps(forestMaps, 'SPB');
        populateOMaps(vsevolozhskMaps, 'SPB');
        populateOMaps(southMaps, 'SPB');
        populateOMaps(priozerskMaps, 'SPB');
        populateOMaps(zelikMaps, 'SPB');
        populateOMaps(vyborgMaps, 'SPB');
        populateOMaps(sosnovoMaps, 'SPB');
        populateOMaps(michuraMaps, 'SPB');
        populateOMaps(vaskelovoMaps, 'SPB');
        populateOMaps(toksovoMaps, 'SPB');
        populateOMaps(parkMaps, 'SPB');
        populateOMaps(cityMaps, 'SPB');
        populateOMaps(schoolMaps, 'SPB');
        populateOMaps(moscowMaps, 'MSK');
        populateOMaps(pskovMaps, 'PSKOV');
        populateOMaps(bashMaps, 'BASH');
        populateOMaps(ryazanMaps, 'RYAZAN');
        populateOMaps(samaraMaps, 'SAMARA');
        populateOMaps(serbiaMaps, 'SERBIA');
        populateOMaps(otherMaps);
        /*
                populateOMaps(rogaineRfarMaps, 'BASH');
                populateOMaps(rogaineBeketovMaps, 'BASH');
                populateOMaps(rogaineKkmMaps, 'BASH');
                populateOMaps(rogaineMaps, 'BASH');
        */

        oMaps = oMaps.filter(m => !m.excluded && !(m.type && m.type.includes('RELIEF')));

        const MAP_TYPE_PARAM = urlParams.get('map-type');
        switch (MAP_TYPE_PARAM) {
            case 'ALL':
                break;
            case 'CITY':
                oMaps = oMaps.filter(m => m.type && m.type.includes('CITY')); break;
            case 'PARK':
                oMaps = oMaps.filter(m => m.type && m.type.includes('PARK')); break;
            case 'VELO':
                oMaps = oMaps.filter(m => m.type && m.type.includes('VELO')); break;
            case 'WINTER':
                oMaps = oMaps.filter(m => m.type && m.type.includes('WINTER')); break;
            case 'OTHER':
                oMaps = oMaps.filter(m => m.type && (m.type.includes('FOTO') || m.type.includes('FUN') || m.type.includes('INDOOR') || m.type.includes('SPECIAL'))); break;
            case 'FOREST':
                oMaps = oMaps.filter(m => !m.type || m.type.includes('FOREST')); break;
            case 'ROGAINE':
                oMaps = oMaps.filter(m => isRogaine(m)); break;
            case 'ORIENT':
            default:
                oMaps = oMaps.filter(m => isOrientMap(m) && !isRogaine(m)); break;
        }

        const REGION_PARAM = urlParams.get('region');
        if (REGION_PARAM && REGION_PARAM !== 'ALL') {
            switch (REGION_PARAM) {
                case 'SPB':
                    oMaps = oMaps.filter(m => m.region === 'SPB' || m.region === 'LNGRD');
                    break;
                case 'MSK':
                case 'BASH':
                case 'PSKOV':
                case 'RYAZAN':
                case 'SAMARA':
                    console.log('---------------')
                    oMaps = oMaps.filter(m => m.region === REGION_PARAM);
                    break;
                case 'OTHER':
                    oMaps = oMaps.filter(m => m.region !== 'SPB' && m.region !== 'LNGRD' && m.region !== 'MSK' && m.region !== 'BASH' && m.region !== 'PSKOV' && m.region !== 'RYAZAN' && m.region !== 'SAMARA');
                    break;
            }
        }
    </script>

    <script src="js/map-build.js"></script>

    <script src="js/charts.js"></script>

    <script>
        function updateUrlParam(paramName, paramValue) {
            const url = new URL(window.location.href);

            if (paramValue) {
                url.searchParams.set(paramName, paramValue);
            } else {
                url.searchParams.delete(paramName);
            }

            window.location.href = url.toString();
        }

        if (MAP_TYPE_PARAM) {
            document.getElementById('map_type_selector').value = MAP_TYPE_PARAM;
        }

        if (REGION_PARAM) {
            document.getElementById('region_selector').value = REGION_PARAM;
        }

        writeWelcomeButton();
    </script>
