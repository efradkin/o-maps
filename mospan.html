                <section data-img="21" title="Задумала Баба Яга отнять у ориентировщиков силу чемпионскую, ловкость беличью, да ум премудрый… Стала по лесам своим их выискивать, да в болота и зелёнку заманивать и стрелку на компасе не в ту сторону поворачивать. А помощникам своим – нечисти лесной, наказала цепляться за беговуху ориентировщицкую, да вырывать из неё лоскутки, силой клубной заряженные. <br />…Долго ль сказка сказывается, да не скоро дело делается… Помоталась по ориентировщицким многодневкам, да соревнованиям Баба Яга (благо в её лесах их достаточно проходило), глядишь уж и сама ориентировщицей скоро станет. Собрала в кучу лоскутки разноцветные. И решила сделать из них ковер-самолет и использовать на соревнованиях по квиддичу вместо метлы своей старой. А чтоб вернуть ориентировщикам силу их украденную, помогите разгадать из каких команд попались спортсмены на козни Бабы Яги и сколько команд этих, ориентировщицких, на ковре-самолете красуется? Но сначала надо с ковра-самолета заклинание бабкино снять, чтоб можно было рассмотреть какие лоскутки на ковре красуются, а снять его можно передвигая и на нужное место пазлы ставя... Так, глядишь, и весь ковер покажется... <br /> Выиграет тот, кто первым правильно угадает число команд и назовет какие…"></section>
                <section data-img="22" title="В лесу проводились массовые соревнования «Кубок Колобка». Это была дистанция спринта с общего старта. В районе финиша зрители увидели такую картинку… Заяц бежал на финиш через 100-й кп. Ему навстречу неслись шесть слонов. Заяц с испугу присел и потерял чип. Двое из слонов, отметившись на КП, убежали обратно. Один из них споткнулся по дороге, другой подрезал финишную разметку. А четыре слона побежали отмечаться на пропущенный ими КП у озера. Каждый из этих слонов встретил двух обезьян, бежавших от озера, на хвосте которых сидело по попугаю. Сколько животных финишировали с результатом и кто из них выиграл Кубок?"></section>

    <script src="js/map-build.js"></script>
    <script>
        AUTHOR_PARAM = 'MSPN';
    </script>
    <script src="js/main.js"></script>
    <script>

        // Фильтрация массива. Оставляем только карты нужного старта.
        oMaps = oMaps.filter(m => (m.layer !== undefined));
        oMaps.sort((b, a) => ((startYear(b) || (year(b) || 9999)) - (startYear(a) || (year(a) || 9999))));

        let authorObj = authors[AUTHOR_PARAM];
        if (authorObj) {
            document.getElementById('start_name').innerHTML = authorObj.name;
            if (authorObj.info) {
                document.getElementById('start_info').style.display = 'block';
                document.querySelector('#start_info span').innerHTML = authorObj.info;

                if (authorObj.foto) {
                    let logo = document.querySelector('#start_info img');
                    logo.style.display = 'block';
                    logo.src = './foto/' + authorObj.foto;
                }
            }
        }

        let container = document.querySelector('.start-maps-wrapper');
        oMaps.forEach(m => {
            let row = `
                    <div class="start-map-box align-items-center d-flex justify-content-center">
                        <a href="#map_link" target="_self"><img src="#map_img_src" title="#map_year#map_place#map_start#map_info"/></a>
                    </div>
            `;
            row = row.replace('#map_img_src', mapImageUrl(m));
            row = row.replace('#map_href', m.link);
            row = row.replace('#map_link', 'map-info.html?map=' + extractFileName(m.url));
            const y = startYear(m) ?? year(m);
            row = row.replace('#map_year', y ? y + ' - ' : '');
            //row = row.replace('#map_month', m.month);
            row = row.replace('#map_place', m.name);
            let strt;
            if (m.start) {
                if (Array.isArray(m.start)) {
                    strt = clean(starts[m.start[0]].name);
                } else {
                    strt = clean(starts[m.start].name);
                }
            }
            row = row.replace('#map_start', strt ? '\n' + strt + '. ' : '');
            row = row.replace('#map_info', m.info ? (strt ? '' : '\n') + strip(m.info) : '');
            const elRow = document.createElement("div");
            elRow.classList.add("row");
            elRow.innerHTML = row;
            container.appendChild(elRow);
        });

        // Массив с адресами картинок
        const images = [];
        let picCounter = 0;

        let fotosDiv = document.getElementById('fotos');
        for (const section of fotosDiv.children) {
            const imgNo = section.getAttribute('data-img');
            if (imgNo) {
                const url = 'foto/mospan/mospan_' + imgNo + '.jpg';
                images.push(url);
                let title = section.getAttribute('title');
                const sectionContent = '<a href="#" onClick="openModal(' + picCounter++ + '); return false;">' +
                    '<img id="mospan_' + imgNo + '" class="help-figure" src="' + url + '" />' +
                    (title ? '<p><label for="mospan_' + imgNo + '">' + title + '</label>' : '') + '</a>';
                section.innerHTML = sectionContent;
            }
        }

        writeWelcomeButton();
    </script>
