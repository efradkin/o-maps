    <div class="o-sheet-roof" style="display: none">
        <a href="#" onclick="downloadSheetTable('o-maps-clubs.csv')" target="_self" title="Скачать таблицу"><img src="images/download_24.png" /></a>

            <thead>
            <tr>
                <th>&nbsp;</th>
                <th>&nbsp;</th>

                <th>Место</th>
                <th>Инфо</th>
                <th>Доп.ссылки</th>
                <th>Тренеры</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="js/ext/bootstrap.min.js"></script>
    <script src="js/ext/bootstrap5-dropdown-ml-hack.js"></script>
    <script src="js/ext/jquery.slim.min.js"></script>

    <script src="js/utils-common.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/welcome.js"></script>

    <script src="js/poi.js"></script>

    <script>
        const REGION_KEY = 'spb';

        let oClubs = [
            ...poi,
        ];

        window.onload = function() {

            oClubs = oClubs.filter(c => (c.type === 'CLUB'));

            // Изначальный рендеринг таблицы
            renderStartsTable();
        }

        // Ссылка на тело таблицы
        const tbody = document.querySelector('.o-main-table tbody');

        // строит табличку с инфой об авторах-составителях
        function renderStartsTable() {
            tbody.innerHTML = '';

            let counter = 1;
            for (let i = 0; i < oClubs.length; i++) {
                let club = oClubs[i];

                const row = document.createElement('tr');
                td(row, counter++);
                td(row, buildLogo(club));
                td(row, buildName(club));
                td(row, buildEventPlace(club, '&poi'));
                td(row, buildInfo(club));
                td(row, buildEventReg(club));
                td(row, buildCouches(club));
                tbody.appendChild(row);
            }
        }

        function td(row, html) {
            const td = document.createElement('td');
            td.innerHTML = html;
            row.appendChild(td);
        }

        function buildName(t) {
            let result = t.name;
            if (t.link) {
                result = `<a href="${t.link}">${t.name}<a/>`;
            }
            return result;
        }

        function buildInfo(s) {
            if (s.info) {
                return s.info;
            }
            return '';
        }

        function buildLogo(s) {
            if (s.logo) {
                return `<img src="logo/${s.logo}" class="track-table-pic" />`
            }
            return '';
        }

        writeWelcomeButton();

        const popupMessage = 'Хотите что-то изменить в таблице? Убрать или добавить? <a href="help/contacts.html">Напишите мне</a>.';
    </script>
    <script src="js/slide-popup.js"></script>
