    <script src="js/welcome.js"></script>

    <script src="js/utils.js"></script>
    <script src="js/news.js"></script>
    <script>
        let onlyMajorNews = false;
        const major = localStorage.getItem('onlyMajorNews');
        if (major != null) {
            onlyMajorNews = (major === 'true');
        }
        if (onlyMajorNews) {
            document.getElementById('only-major-news').checked = 'checked';
        }

        // Массив с адресами картинок
        const images = [];
        let picCounter = 0;

        let container = document.querySelector('.container');
        news.forEach(n => {
            if (onlyMajorNews && !n.major) {
                return;
            }
            const img = '<a href="#" onClick="openModal(#counter); return false;">' +
                '<img src="#src" class="help-figure help-figure-left news-figure" /></a>';
            //let img = '<img src="#src" class="help-figure help-figure-left news-figure" />'
            let row = `
                <section>
                    <h4>#date #title</h4>
                    <p>#img#text
                </section>
            `;
            row = row.replace('#date', `<span class="news_date">${formatDate(n, true, true)}.</span>`);
            row = row.replace('#title', n.title);
            const text = n.info ?? '';
            row = row.replace('#text', text);
            let imgs = '';
            let idx = picCounter;
            if (n.pics) {
                for (let p = 0; (p < n.pics[1] && p < 2); p++) {
                    imgs += img.replace('#src', `news/${n.pics[0]}/thumb_${p+1}.jpg`).replace('#counter', picCounter+p);
                }
            }
            row = row.replace('#img', imgs);

            const elRow = document.createElement("div");
            elRow.classList.add("row");
            if (n.major) {
                elRow.classList.add("major");
            }
            elRow.innerHTML = row;
            container.appendChild(elRow);

            if (n.pics) {
                for (let p = 1; p <= n.pics[1]; p++) {
                    let url = 'news/' + n.pics[0] + '/pic_' + p + '.jpg';
                    images.push(url);
                    picCounter++;
                }
            }
        });

        function switchMajorNews(value) {
            localStorage.setItem('onlyMajorNews', value);
            location.reload();
        }

        writeWelcomeButton();
    </script>
